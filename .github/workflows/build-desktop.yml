name: Build Desktop Apps

# 데스크톱 설치 파일(.exe / .dmg / AppImage)을 OS별 네이티브 러너에서 빌드한다.
#  - 수동 실행(workflow_dispatch) 또는 v* 태그 푸시 시 동작.
#  - 태그 푸시면 동일 태그의 GitHub Release에 산출물을 첨부한다.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux (AppImage)
            artifact_name: desktop-linux
            artifact_glob: desktop/dist/*.AppImage
          - os: windows-latest
            label: Windows (NSIS .exe)
            artifact_name: desktop-windows
            artifact_glob: desktop/dist/*.exe
          - os: macos-latest
            label: macOS (.dmg)
            artifact_name: desktop-macos
            artifact_glob: desktop/dist/*.dmg
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1) 프론트(web/dist) 빌드 — electron-builder가 extraResources로 동봉한다.
      - name: Build web frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      # 2) Electron 패키징 (호스트 OS용 타깃을 빌드: Linux=AppImage / Win=nsis / mac=dmg)
      - name: Build desktop installer
        working-directory: desktop
        env:
          # 서명 인증서가 없으므로 자동 서명 탐색을 끈다(미서명 산출물).
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install
          npx electron-builder --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
