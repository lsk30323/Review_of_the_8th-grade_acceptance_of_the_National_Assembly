<!doctype html>
<html lang="ko" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1f3a8a" />
    <meta
      name="description"
      content="국회직 8급 공무원 합격후기·합격수기를 네이버 검색 API로 한곳에 모아 보여주는 검색 도구"
    />
    <title>국회직 8급 합격후기 검색</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">8</span>
        <div>
          <h1>국회직 8급 합격후기 검색</h1>
          <p class="brand-sub">흩어진 합격수기를 한곳에서</p>
        </div>
      </div>
      <div class="header-actions">
        <span id="status-chip" class="status-chip" hidden></span>
        <button id="theme-toggle" class="icon-btn" type="button" aria-label="테마 전환">🌙</button>
      </div>
    </header>

    <main>
      <section class="search-panel">
        <form id="search-form" class="search-bar" role="search">
          <input
            id="search-input"
            type="search"
            name="q"
            autocomplete="off"
            enterkeyhint="search"
            placeholder="예: 국회직 8급 면접 후기"
            aria-label="검색어"
          />
          <button class="btn-primary" type="submit">검색</button>
        </form>
        <div class="controls">
          <div class="chips" id="source-chips" role="group" aria-label="소스 필터"></div>
          <div class="sort-toggle" id="sort-toggle" role="group" aria-label="정렬 방식"></div>
        </div>
      </section>

      <nav class="tabs" id="tabs" role="tablist">
        <button class="tab is-active" type="button" data-tab="results" role="tab" aria-selected="true">
          검색 결과
        </button>
        <button class="tab" type="button" data-tab="bookmarks" role="tab" aria-selected="false">
          북마크 <span class="count" id="bm-count">0</span>
        </button>
      </nav>

      <section id="view-results" class="view" role="tabpanel">
        <div id="result-meta" class="result-meta"></div>
        <div id="results" class="results"></div>
        <div id="load-more-wrap"></div>
      </section>

      <section id="view-bookmarks" class="view" role="tabpanel" hidden>
        <div id="bookmarks" class="results"></div>
      </section>
    </main>

    <footer class="app-footer">
      <p>
        제목·짧은 스니펫·원문 링크만 제공합니다(검색 인덱싱 수준). 후기 본문은 저장·재배포하지
        않으며, 원문의 저작권은 각 작성자에게 있습니다.
      </p>
      <p>1차 소스: 네이버 검색 API · 키는 백엔드에서만 관리됩니다.</p>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
